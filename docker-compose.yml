name: aem-dispatcher-filter-testing

services:
  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
     - CONTROL_PORT=${CONTROL_PORT:-59173}
     - TEST_URL_BASE=${TEST_URL_BASE:-http://127.0.0.1}
    image: pryor/aem-dispatcher-filter-testing:rockylinux8v2
    # The aarch64 (arm64) build of mod_dispatcher.so requires GLIBC_2.32, which is not
    # available on Rocky/RHEL 8 (glibc 2.28). Pin to amd64 so the x86_64 dispatcher
    # binary is downloaded — this matches the RHEL 8 production build and loads cleanly.
    platform: linux/amd64
    # platform: linux/arm64
    ports:
    - "80:80"
    # Loopback-only; set CONTROL_PORT in .env if this port is already in use on the host.
    - "127.0.0.1:${CONTROL_PORT:-59173}:${CONTROL_PORT:-59173}"
    volumes:
      - ./filters/:/etc/httpd/conf.dispatcher.d/filters/
      # Do not mount ./dispatcher by default: an empty or wrong-arch mod_dispatcher.so on
      # the host breaks httpd (see disp_module_valid.sh). To use a vendor .so, add:
      #   - ./dispatcher/mod_dispatcher.so:/etc/httpd/modules/dispatcher/mod_dispatcher.so:ro
      - ./logs/:/var/log/httpd/
      # Test path JSON files — entire tests/ directory is mounted so all *.json files are listable.
      - ./tests/:/usr/local/share/tests/
